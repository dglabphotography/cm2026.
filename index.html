<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM 2026 — Pronostics Famille</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════ VARIABLES ═══════════ */
:root{
  --gold:#E8A020;--gold-l:#FFCA50;--gold-d:#8A6010;
  --gold-faint:rgba(255,202,80,0.12);--gold-glow:rgba(255,202,80,0.35);
  --bg:#02050E;--s0:#030810;--s1:#060F22;--s2:#091530;--s3:#0D1C3E;--s4:#12244C;
  --text:#EEF4FF;--muted:#7A9EC8;--muted2:#354E72;
  /* GLASS ICE — beaucoup plus prononcé */
  --glass:rgba(8,20,55,0.45);
  --glass2:rgba(10,25,65,0.65);
  --glass-card:rgba(12,28,70,0.52);
  --ice-border:rgba(100,170,255,0.35);
  --ice-border2:rgba(140,200,255,0.55);
  --ice-glow:rgba(80,150,255,0.25);
  --ice-highlight:rgba(180,220,255,0.18);
  --ice-inner:rgba(60,130,255,0.08);
  /* Néon coloré */
  --neon-blue:rgba(0,120,255,0.6);
  --neon-purple:rgba(120,60,255,0.5);
  --neon-cyan:rgba(0,200,255,0.4);
  --green:#22C55E;--red:#EF4444;--blue:#4090FF;--purple:#8B5CF6;
  --r:16px;--r2:10px;
  --shadow:0 12px 40px rgba(0,0,10,.7);
  --shadow-gold:0 0 50px rgba(255,202,80,0.18);
  --shadow-ice:0 8px 40px rgba(0,80,255,0.18),0 2px 0 rgba(140,200,255,0.12) inset;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
/* Pages ont un fond transparent pour laisser voir le canvas */
#app{display:none;position:relative;z-index:1;}

/* ═══════════ BACKGROUND LAYERS ═══════════ */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#stadium-layer{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 120% 60% at 50% 100%, rgba(0,40,100,.8) 0%, transparent 60%),
    radial-gradient(ellipse 80% 40% at 20% 50%, rgba(0,20,60,.6) 0%, transparent 50%),
    radial-gradient(ellipse 80% 40% at 80% 50%, rgba(0,20,60,.6) 0%, transparent 50%),
    radial-gradient(ellipse 200% 80% at 50% 110%, rgba(10,60,150,.4) 0%, transparent 50%);
}
/* Lumieres stade */
.stadium-light{
  position:fixed;pointer-events:none;z-index:0;
  border-radius:50%;filter:blur(80px);
  animation:lightPulse 4s ease-in-out infinite;
}
@keyframes lightPulse{
  0%,100%{opacity:.15;transform:scale(1);}
  50%{opacity:.28;transform:scale(1.1);}
}

/* ═══════════ AUTH SCREEN ═══════════ */
#auth-screen{
  min-height:100vh;display:none;align-items:center;justify-content:center;
  padding:1rem;position:relative;z-index:10;
}
#auth-screen.show{display:flex;}
#auth-screen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 20%,rgba(245,185,58,.12) 0%,transparent 70%);
  pointer-events:none;
}
.auth-box{
  width:100%;max-width:400px;
  background:rgba(8,18,50,.7);
  backdrop-filter:blur(40px) saturate(2) brightness(1.15);
  -webkit-backdrop-filter:blur(40px) saturate(2) brightness(1.15);
  border:1px solid var(--ice-border);
  border-top:1px solid var(--ice-border2);
  border-radius:24px;
  box-shadow:
    0 40px 100px rgba(0,0,30,.85),
    0 0 60px rgba(30,100,255,.2),
    inset 0 1px 0 rgba(180,220,255,.25),
    inset 0 -1px 0 rgba(60,130,255,.1);
  padding:2.5rem;position:relative;overflow:hidden;
}
.auth-box::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(180,220,255,.04) 0%,transparent 50%,rgba(180,220,255,.02) 100%);
  border-radius:24px;pointer-events:none;
}
.auth-box::after{
  content:'⚽';position:absolute;top:-20px;right:-20px;
  font-size:100px;opacity:.03;transform:rotate(-15deg);
  pointer-events:none;
}
.auth-logo{
  font-family:'Bebas Neue';font-size:2.6rem;color:transparent;
  background:linear-gradient(135deg,var(--gold-l),var(--gold));
  -webkit-background-clip:text;background-clip:text;
  text-align:center;letter-spacing:.12em;margin-bottom:.15rem;
}
.auth-trophy{text-align:center;font-size:2rem;margin-bottom:.5rem;}
.auth-sub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:1.75rem;font-style:italic;}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:1.5rem;gap:3px;}
.auth-tab{
  flex:1;padding:.5rem;text-align:center;border:none;background:none;
  color:var(--muted);font-family:'DM Sans';font-size:.84rem;font-weight:600;
  border-radius:8px;cursor:pointer;transition:.25s;
}
.auth-tab.active{background:linear-gradient(135deg,var(--s4),var(--s3));color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3);}
label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.07em;}
.inp{
  width:100%;
  background:rgba(4,12,38,.7);
  backdrop-filter:blur(15px);
  border:1px solid var(--ice-border);
  border-top:1px solid var(--ice-border2);
  border-radius:var(--r2);
  padding:.7rem 1rem;color:var(--text);font-family:'DM Sans';font-size:.92rem;
  outline:none;transition:.25s;margin-bottom:.85rem;
  box-shadow:inset 0 2px 10px rgba(0,0,30,.5),inset 0 1px 0 rgba(140,200,255,.15);
}
.inp:focus{
  border-color:rgba(100,180,255,.7);
  border-top-color:rgba(180,220,255,.9);
  background:rgba(8,20,60,.8);
  box-shadow:0 0 0 3px rgba(60,150,255,.2),0 0 20px rgba(60,150,255,.15),inset 0 2px 10px rgba(0,0,40,.4);
}
.inp::placeholder{color:var(--muted2);}
.btn-primary{
  width:100%;background:linear-gradient(135deg,var(--gold-l),var(--gold));
  color:#060A10;border:none;padding:.8rem;border-radius:var(--r2);
  font-family:'DM Sans';font-size:.95rem;font-weight:800;cursor:pointer;
  transition:.25s;letter-spacing:.03em;position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,.15));
  opacity:0;transition:.25s;
}
.btn-primary:hover::after{opacity:1;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(245,185,58,.4);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.auth-msg{font-size:.8rem;text-align:center;margin-top:.6rem;min-height:1.1em;font-weight:500;}
.auth-msg.err{color:var(--red);}.auth-msg.ok{color:var(--green);}

/* ═══════════ HEADER ═══════════ */
header{
  background:rgba(3,8,22,.82);
  backdrop-filter:blur(40px) saturate(2);
  -webkit-backdrop-filter:blur(40px) saturate(2);
  border-bottom:1px solid var(--ice-border);
  box-shadow:
    0 1px 0 rgba(140,200,255,.15),
    0 8px 40px rgba(0,0,30,.6),
    inset 0 -1px 0 rgba(80,150,255,.1);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;height:62px;position:sticky;top:0;z-index:100;
}
.h-logo{
  font-family:'Bebas Neue';font-size:1.5rem;
  background:linear-gradient(135deg,var(--gold-l),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  letter-spacing:.1em;display:flex;align-items:center;gap:.5rem;
}
.h-logo-icon{font-size:1.2rem;}
nav{display:flex;gap:.2rem;}
.nb{
  background:none;border:none;color:var(--muted);font-family:'DM Sans';
  font-size:.78rem;font-weight:600;padding:.4rem .85rem;border-radius:var(--r2);
  cursor:pointer;transition:.2s;text-transform:uppercase;letter-spacing:.06em;
}
.nb:hover{color:var(--text);background:var(--s2);}
.nb.active{
  color:var(--gold-l);
  background:rgba(255,180,0,.12);
  border:1px solid rgba(255,200,60,.4);
  box-shadow:0 0 16px rgba(255,180,0,.2),inset 0 1px 0 rgba(255,220,100,.15);
  text-shadow:0 0 10px rgba(255,200,60,.5);
}
.h-user{display:flex;align-items:center;gap:.6rem;}
.h-pseudo{font-size:.82rem;font-weight:700;color:var(--text);}
.h-admin{
  font-size:.65rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  background:linear-gradient(135deg,rgba(245,185,58,.2),rgba(201,146,26,.2));
  color:var(--gold-l);padding:.18rem .5rem;border-radius:4px;
  border:1px solid rgba(245,185,58,.3);
}
.btn-logout{
  background:none;border:1px solid var(--border2);color:var(--muted);
  font-size:.72rem;padding:.28rem .65rem;border-radius:var(--r2);
  cursor:pointer;font-family:'DM Sans';transition:.2s;
}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

/* ═══════════ COUNTDOWN BANNER ═══════════ */
#countdown-banner{
  background:linear-gradient(90deg,rgba(245,185,58,.08),rgba(245,185,58,.04),rgba(245,185,58,.08));
  border-bottom:1px solid rgba(245,185,58,.1);
  padding:.6rem 1.5rem;text-align:center;font-size:.8rem;color:var(--muted);
  display:none;
}
#countdown-banner.show{display:block;}
#countdown-banner strong{color:var(--gold-l);font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:.05em;}

/* ═══════════ MAIN ═══════════ */
main{max-width:920px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1;}
.page{display:none;animation:fadeIn .3s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* ═══════════ SCROLL ANIMATIONS ═══════════ */
.scroll-reveal{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease;}
.scroll-reveal.visible{opacity:1;transform:none;}

/* ═══════════ PHASE / DATE HEADERS ═══════════ */
.phase-sep{
  margin:2.5rem 0 .3rem;display:flex;align-items:center;gap:.75rem;
}
.phase-sep-label{
  font-family:'Bebas Neue';font-size:1.1rem;color:var(--gold-l);
  letter-spacing:.1em;white-space:nowrap;
}
.phase-sep-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(245,185,58,.3),transparent);}
.date-hd{
  font-family:'Bebas Neue';font-size:1.25rem;color:var(--text);
  letter-spacing:.07em;margin:1.5rem 0 .6rem;
  display:flex;align-items:center;gap:.6rem;
}
.date-badge{
  background:var(--gold-faint);color:var(--gold-l);
  border:1px solid rgba(245,185,58,.2);border-radius:6px;
  padding:.12rem .6rem;font-size:.8rem;
}
.date-hd::after{content:'';flex:1;height:1px;background:var(--border);}

/* ═══════════ MATCH CARD ═══════════ */
.mc{
  background:var(--glass-card);
  backdrop-filter:blur(28px) saturate(1.8) brightness(1.1);
  -webkit-backdrop-filter:blur(28px) saturate(1.8) brightness(1.1);
  border:1px solid var(--ice-border);
  border-top:1px solid var(--ice-border2);
  border-radius:var(--r);
  padding:.85rem 1.1rem;margin-bottom:.55rem;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.75rem;
  transition:all .3s cubic-bezier(.2,.8,.3,1);position:relative;overflow:hidden;
  box-shadow:
    0 8px 32px rgba(0,10,40,.6),
    0 0 0 1px rgba(100,170,255,0.12),
    inset 0 1px 0 rgba(180,220,255,.22),
    inset 0 -1px 0 rgba(60,130,255,.08);
}
/* Reflet haut de carte */
.mc::after{
  content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,rgba(180,220,255,.06) 0%,transparent 100%);
  pointer-events:none;border-radius:var(--r) var(--r) 0 0;
}
.mc::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:transparent;transition:all .3s;border-radius:3px 0 0 3px;
  box-shadow:none;
}
.mc:hover{
  border-color:var(--ice-border2);
  transform:translateY(-2px) scale(1.005);
  box-shadow:
    0 16px 48px rgba(0,10,50,.7),
    0 0 40px rgba(40,120,255,.2),
    0 0 80px rgba(40,120,255,.08),
    inset 0 1px 0 rgba(180,220,255,.35),
    inset 0 -1px 0 rgba(80,160,255,.1);
  background:rgba(15,35,80,.65);
}
.mc.saved::before{background:linear-gradient(180deg,#22C55E,rgba(34,197,94,.4));box-shadow:0 0 12px rgba(34,197,94,.6),0 0 4px rgba(34,197,94,.9);}
.mc.saved{border-color:rgba(34,197,94,.4);box-shadow:0 8px 32px rgba(0,10,40,.6),0 0 20px rgba(34,197,94,.1),inset 0 1px 0 rgba(34,197,94,.15);}
.mc.locked{opacity:.7;}
.mc.locked::before{background:linear-gradient(180deg,var(--muted2),transparent);}
.mc.started{border-color:rgba(255,202,80,.4);}
.mc.started::before{background:linear-gradient(180deg,var(--gold-l),var(--gold));box-shadow:0 0 12px rgba(255,202,80,.7);}
.team{display:flex;align-items:center;gap:.55rem;}
.team.r{flex-direction:row-reverse;}
.flag{font-size:1.4rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));}
.tn{font-weight:700;font-size:.88rem;cursor:pointer;transition:color .15s;line-height:1.2;}
.tn:hover{color:var(--gold-l);}
.mc-mid{display:flex;flex-direction:column;align-items:center;gap:.3rem;}
.mc-time{font-size:.62rem;color:var(--muted);text-align:center;font-weight:500;}
.si-wrap{display:flex;align-items:center;gap:.4rem;}
.si{
  width:44px;height:44px;text-align:center;
  background:rgba(5,15,45,.75);
  backdrop-filter:blur(15px);
  border:1px solid var(--ice-border);
  border-top:1px solid var(--ice-border2);
  border-radius:var(--r2);
  color:#E8F4FF;font-size:1.1rem;font-weight:700;font-family:'Bebas Neue';
  outline:none;transition:.25s;-moz-appearance:textfield;
  box-shadow:
    inset 0 2px 10px rgba(0,0,30,.5),
    inset 0 1px 0 rgba(140,200,255,.2),
    0 2px 8px rgba(0,50,200,.2);
  text-shadow:0 0 12px rgba(150,200,255,.6);
}
.si::-webkit-inner-spin-button,.si::-webkit-outer-spin-button{-webkit-appearance:none;}
.si:focus{
  border-color:rgba(100,180,255,.8);
  border-top-color:rgba(180,220,255,1);
  background:rgba(10,25,70,.85);
  box-shadow:
    0 0 0 3px rgba(60,150,255,.25),
    0 0 20px rgba(60,150,255,.3),
    inset 0 2px 10px rgba(0,0,40,.4);
  color:#fff;
  text-shadow:0 0 15px rgba(120,200,255,.9);
}
.sep{font-family:'Bebas Neue';font-size:1.3rem;color:var(--muted2);}
.lock-score{font-family:'Bebas Neue';font-size:1.05rem;color:var(--muted);letter-spacing:.05em;}
.lock-icon{font-size:.65rem;color:var(--muted);font-weight:500;}

/* ═══════════ SPINNER ═══════════ */
.spinner{
  display:inline-block;width:18px;height:18px;
  border:2px solid var(--border2);border-top-color:var(--gold-l);
  border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-page{display:flex;align-items:center;justify-content:center;padding:4rem;gap:.75rem;color:var(--muted);font-size:.9rem;}

/* ═══════════ RÉSULTATS ═══════════ */
.rc{
  background:var(--glass-card);
  backdrop-filter:blur(28px) saturate(1.8);
  -webkit-backdrop-filter:blur(28px) saturate(1.8);
  border:1px solid var(--ice-border);
  border-top:1px solid var(--ice-border2);
  border-radius:var(--r);
  padding:1rem 1.1rem;margin-bottom:.65rem;transition:all .25s;
  box-shadow:
    0 8px 32px rgba(0,10,40,.6),
    inset 0 1px 0 rgba(180,220,255,.2),
    inset 0 -1px 0 rgba(60,130,255,.06);
}
.rc:hover{border-color:var(--ice-border2);transform:translateY(-1px);box-shadow:0 12px 40px rgba(0,10,50,.7),0 0 30px rgba(40,120,255,.1),inset 0 1px 0 rgba(180,220,255,.3);}
.rc-head{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.75rem;margin-bottom:.7rem;}
.ri{
  width:42px;height:42px;text-align:center;
  background:rgba(4,12,38,.75);
  backdrop-filter:blur(10px);
  border:1px solid var(--ice-border);
  border-top:1px solid var(--ice-border2);
  border-radius:var(--r2);
  color:var(--gold-l);font-size:1.1rem;font-weight:700;font-family:'Bebas Neue';
  outline:none;-moz-appearance:textfield;transition:.2s;
  box-shadow:inset 0 2px 8px rgba(0,0,30,.5),inset 0 1px 0 rgba(140,200,255,.15);
  text-shadow:0 0 10px rgba(255,200,60,.4);
}
.ri:focus{border-color:rgba(100,180,255,.7);box-shadow:0 0 0 3px rgba(60,150,255,.2),inset 0 2px 8px rgba(0,0,40,.4);}
.ri::-webkit-inner-spin-button,.ri::-webkit-outer-spin-button{-webkit-appearance:none;}
.ri:focus{border-color:var(--gold);}
.btn-save{
  background:linear-gradient(135deg,var(--blue),#2563EB);color:#fff;border:none;
  padding:.35rem .8rem;border-radius:var(--r2);font-weight:700;font-size:.76rem;
  cursor:pointer;transition:.2s;font-family:'DM Sans';
}
.btn-save:hover{filter:brightness(1.15);transform:translateY(-1px);}
.btn-del{
  background:rgba(239,68,68,.12);color:var(--red);
  border:1px solid rgba(239,68,68,.25);padding:.35rem .6rem;
  border-radius:var(--r2);font-size:.76rem;cursor:pointer;font-family:'DM Sans';transition:.2s;
}
.btn-del:hover{background:rgba(239,68,68,.25);}
.result-display{font-family:'Bebas Neue';font-size:1.8rem;color:var(--gold-l);letter-spacing:.05em;}
.pronos-tbl{width:100%;border-collapse:collapse;font-size:.8rem;}
.pronos-tbl th{
  color:var(--muted);font-weight:600;font-size:.72rem;text-transform:uppercase;
  letter-spacing:.05em;padding:.3rem .5rem;border-bottom:1px solid var(--border);text-align:left;
}
.pronos-tbl td{padding:.32rem .5rem;border-bottom:1px solid rgba(255,255,255,.02);}
.pronos-tbl tr:last-child td{border-bottom:none;}
.badge{display:inline-block;padding:.12rem .48rem;border-radius:20px;font-weight:800;font-size:.72rem;}
.b3{background:rgba(245,185,58,.15);color:var(--gold-l);border:1px solid rgba(245,185,58,.2);}
.b2{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.b1{background:rgba(59,130,246,.12);color:#93C5FD;border:1px solid rgba(59,130,246,.2);}
.b0{background:rgba(255,255,255,.04);color:var(--muted);}
.hidden-notice{font-size:.74rem;color:var(--muted);font-style:italic;padding:.3rem 0;display:flex;align-items:center;gap:.4rem;}

/* ═══════════ CLASSEMENT ═══════════ */
.rank-podium{display:flex;gap:.75rem;margin-bottom:1.5rem;justify-content:center;}
.podium-card{
  background:var(--glass-card);
  backdrop-filter:blur(28px) saturate(1.8);
  -webkit-backdrop-filter:blur(28px) saturate(1.8);
  border:1px solid var(--ice-border);
  border-top:1px solid var(--ice-border2);
  border-radius:var(--r);
  padding:1rem;text-align:center;flex:1;max-width:200px;
  transition:.3s;position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,10,40,.6),inset 0 1px 0 rgba(180,220,255,.22);
}
.podium-card.rank-1{border-color:rgba(245,185,58,.35);box-shadow:0 0 30px rgba(245,185,58,.1);}
.podium-card.rank-2{border-color:rgba(203,213,225,.2);}
.podium-card.rank-3{border-color:rgba(192,120,64,.2);}
.podium-icon{font-size:1.8rem;margin-bottom:.4rem;}
.podium-name{font-weight:800;font-size:.9rem;margin-bottom:.2rem;}
.podium-pts{font-family:'Bebas Neue';font-size:1.6rem;}
.podium-card.rank-1 .podium-pts{color:var(--gold-l);}
.podium-card.rank-2 .podium-pts{color:#CBD5E1;}
.podium-card.rank-3 .podium-pts{color:#C07840;}
.rank-tbl{width:100%;border-collapse:collapse;}
.rank-tbl th{
  font-family:'Bebas Neue';letter-spacing:.06em;font-size:.85rem;color:var(--muted);
  padding:.5rem 1rem;border-bottom:2px solid var(--border);text-align:left;
}
.rank-tbl td{padding:.7rem 1rem;border-bottom:1px solid var(--border);}
.rank-tbl tr:hover td{background:rgba(255,255,255,.015);}

/* ═══════════ TOAST ═══════════ */

#toast.err{border-color:rgba(239,68,68,.4);color:var(--red);}

/* ═══════════ MODAL ÉQUIPE ═══════════ */
#team-modal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;}
#team-modal.open{display:flex;}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);}
.modal-box{
  position:relative;z-index:1;
  background:rgba(6,16,48,.82);

  border:1px solid var(--ice-border);
  border-top:1px solid var(--ice-border2);
  border-radius:24px;
  padding:1.75rem;width:100%;max-width:500px;max-height:90vh;

    0 40px 100px rgba(0,0,30,.9),

@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px);}to{opacity:1;transform:none;}}
.modal-close{

.modal-team-header{display:flex;align-items:center;gap:.85rem;margin-bottom:1.25rem;}

.modal-group-badge{

.form-tbl,.group-tbl{width:100%;border-collapse:collapse;font-size:.82rem;}

/* ═══════════ STATS PANEL ═══════════ */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.5rem;}

/* Podium picker */
.podium-picker{display:flex;flex-direction:column;gap:.6rem;}

.podium-slot-label.s2{background:rgba(192,192,192,.12);color:#CBD5E1;border:1px solid rgba(192,192,192,.25);}
.podium-slot-label.s3{background:rgba(205,127,50,.12);color:#C07840;border:1px solid rgba(205,127,50,.25);}
.podium-slot select,.survey-select{
  flex:1;
  background:rgba(4,12,38,.7);

.survey-saved-badge{

}

.survey-result-row{
  display:flex;align-items:center;gap:.75rem;margin-top:.85rem;

}

.btn-validate{

}

}

<script>
// ═══════════════════════════════════════════════════
// STADIUM SLOW-MOTION BACKGROUND
// ═══════════════════════════════════════════════════
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(a,b){ return Math.random()*(b-a)+a; }

  // ── PELOUSE (gazon du stade en perspective) ──
  function drawPitch(){
    ctx.save();
    // Gradient pelouse vert sombre très subtil en bas
    const g = ctx.createLinearGradient(0, H*0.55, 0, H);
    g.addColorStop(0, 'rgba(0,30,15,0)');
    g.addColorStop(0.4, 'rgba(0,35,18,0.18)');
    g.addColorStop(1, 'rgba(0,40,20,0.32)');
    ctx.fillStyle = g;
    ctx.fillRect(0, H*0.55, W, H*0.45);

    // Lignes de pelouse en perspective
    ctx.strokeStyle = 'rgba(0,80,30,0.12)';
    ctx.lineWidth = 1;
    const vanishX = W/2, vanishY = H*0.55;
    for(let i=0; i<=12; i++){
      const x = (i/12)*W;
      ctx.beginPath();
      ctx.moveTo(vanishX + (x-vanishX)*0.05, vanishY + H*0.02);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    // Lignes horizontales
    for(let i=0; i<6; i++){
      const t = i/5;
      const y = H*0.58 + t*H*0.42;
      const xOff = (t*t)*W*0.35;
      ctx.beginPath();
      ctx.moveTo(xOff, y);
      ctx.lineTo(W-xOff, y);
      ctx.stroke();
    }
    // Cercle central en perspective
    ctx.strokeStyle='rgba(0,80,30,0.1)';
    ctx.beginPath();
    ctx.ellipse(W/2, H*0.68, W*0.18, H*0.06, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // ── TRIBUNES (points lumineux = spectateurs) ──
  const crowd = [];
  for(let i=0; i<280; i++){
    crowd.push({
      x: rand(0,1), y: rand(0, 0.42),
      size: rand(1.5,4),
      r: Math.floor(rand(100,255)),
      g: Math.floor(rand(80,200)),
      b: Math.floor(rand(80,255)),
      phase: rand(0, Math.PI*2),
      speed: rand(0.003, 0.015),
      baseAlpha: rand(0.04, 0.18),
    });
  }

  // ── FAISCEAU PROJECTEUR ──
  const spotlights = [
    {x:0.15, y:0, targetX:0.35, targetY:0.62, phase:0, speed:0.003},
    {x:0.85, y:0, targetX:0.65, targetY:0.62, phase:Math.PI, speed:0.004},
    {x:0.5,  y:0, targetX:0.5,  targetY:0.58, phase:Math.PI/2, speed:0.002},
  ];

  // ── PARTICULES CONFETTIS LENTS ──
  const confetti = [];
  for(let i=0; i<35; i++){
    confetti.push({
      x:rand(0,1), y:rand(-0.2,1),
      vx:rand(-0.00015,0.00015),
      vy:rand(0.00008,0.0003),
      size:rand(2,5),
      rot:rand(0,Math.PI*2),
      vrot:rand(-0.005,0.005),
      color:`hsl(${rand(180,240)},${rand(40,80)}%,${rand(60,85)}%)`,
      alpha:rand(0.06,0.2),
    });
  }

  // ── BALLON SLOW-MO ──
  const ball = {
    x:0.5, y:0.4,
    vx:rand(0.0003,0.0008)*(Math.random()>.5?1:-1),
    vy:rand(0.0002,0.0006)*(Math.random()>.5?1:-1),
    size:22, rot:0, vrot:rand(0.008,0.02),
    alpha:0, targetAlpha:0.35,
    trail:[],
  };

  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    t+=0.016;

    // --- FOND DÉGRADÉ NUIT ---
    const bgGrad = ctx.createRadialGradient(W/2,H*0.3,0,W/2,H*0.3,W*0.8);
    bgGrad.addColorStop(0,'rgba(5,15,50,0.95)');
    bgGrad.addColorStop(0.5,'rgba(2,8,30,0.97)');
    bgGrad.addColorStop(1,'rgba(0,3,15,1)');
    ctx.fillStyle=bgGrad;
    ctx.fillRect(0,0,W,H);

    // --- PROJECTEURS ---
    for(const sl of spotlights){
      const ox = Math.sin(t*sl.speed + sl.phase)*0.08;
      const cx = (sl.x+ox)*W;
      const cy = sl.y*H;
      const tx = (sl.targetX+Math.sin(t*sl.speed*.7+sl.phase)*0.05)*W;
      const ty = sl.targetY*H;
      const spGrad = ctx.createLinearGradient(cx,cy,tx,ty);
      spGrad.addColorStop(0,'rgba(200,220,255,0.06)');
      spGrad.addColorStop(0.6,'rgba(150,190,255,0.025)');
      spGrad.addColorStop(1,'rgba(100,160,255,0)');
      ctx.save();
      ctx.beginPath();
      const spread = 0.06;
      ctx.moveTo(cx,cy);
      ctx.lineTo(tx - W*spread, ty);
      ctx.lineTo(tx + W*spread, ty);
      ctx.closePath();
      ctx.fillStyle = spGrad;
      ctx.fill();
      // Halo source
      const halo = ctx.createRadialGradient(cx,cy,0,cx,cy,60);
      halo.addColorStop(0,'rgba(200,220,255,0.18)');
      halo.addColorStop(1,'rgba(200,220,255,0)');
      ctx.beginPath();ctx.arc(cx,cy,60,0,Math.PI*2);
      ctx.fillStyle=halo;ctx.fill();
      ctx.restore();
    }

    // --- PELOUSE ---
    drawPitch();

    // --- FOULE ---
    for(const c of crowd){
      const flicker = Math.sin(t*c.speed + c.phase);
      const a = c.baseAlpha + flicker*c.baseAlpha*0.6;
      ctx.globalAlpha = Math.max(0,a);
      ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
      const cx2 = c.x*W, cy2 = c.y*H*0.45;
      ctx.beginPath();ctx.arc(cx2,cy2,c.size,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // --- CONFETTIS ---
    for(const c of confetti){
      c.x+=c.vx; c.y+=c.vy; c.rot+=c.vrot;
      if(c.y>1.1) c.y=-0.05;
      if(c.x<-0.02) c.x=1.02;
      if(c.x>1.02) c.x=-0.02;
      ctx.save();
      ctx.globalAlpha = c.alpha;
      ctx.translate(c.x*W, c.y*H);
      ctx.rotate(c.rot);
      ctx.fillStyle=c.color;
      ctx.fillRect(-c.size/2,-c.size/4,c.size,c.size/2);
      ctx.restore();
    }

    // --- BALLON SLOW-MO ---
    ball.x += ball.vx; ball.y += ball.vy; ball.rot += ball.vrot;
    ball.vy += 0.000008; // gravité très lente
    if(ball.x<-0.1||ball.x>1.1){ ball.vx*=-1; ball.x=Math.max(-0.05,Math.min(1.05,ball.x)); }
    if(ball.y<-0.1){ ball.vy*=-1; }
    if(ball.y>1.1){ ball.y=-0.1; ball.x=rand(0.2,0.8); ball.vy=rand(0.0002,0.0006); ball.vx=rand(-0.0006,0.0006); }
    ball.alpha += (ball.targetAlpha - ball.alpha)*0.02;
    // Trail
    ball.trail.push({x:ball.x*W,y:ball.y*H,alpha:ball.alpha});
    if(ball.trail.length>18) ball.trail.shift();
    for(let i=0;i<ball.trail.length;i++){
      const tp=ball.trail[i];
      const ta=(i/ball.trail.length)*tp.alpha*0.3;
      const ts=ball.size*(i/ball.trail.length)*0.6;
      ctx.globalAlpha=ta;
      ctx.fillStyle='rgba(180,210,255,0.8)';
      ctx.beginPath();ctx.arc(tp.x,tp.y,ts,0,Math.PI*2);ctx.fill();
    }
    // Ballon
    ctx.save();
    ctx.globalAlpha = ball.alpha;
    ctx.translate(ball.x*W, ball.y*H);
    ctx.rotate(ball.rot);
    // Ombre portée
    ctx.shadowColor='rgba(100,160,255,0.4)';
    ctx.shadowBlur=20;
    // Corps
    const ballGrad=ctx.createRadialGradient(-4,-4,2,0,0,ball.size);
    ballGrad.addColorStop(0,'rgba(240,248,255,0.9)');
    ballGrad.addColorStop(0.5,'rgba(180,210,255,0.5)');
    ballGrad.addColorStop(1,'rgba(80,140,255,0.2)');
    ctx.beginPath();ctx.arc(0,0,ball.size,0,Math.PI*2);
    ctx.fillStyle=ballGrad;ctx.fill();
    // Pentagones
    ctx.strokeStyle='rgba(100,160,255,0.25)';ctx.lineWidth=1.5;
    for(let i=0;i<5;i++){
      const a2=i*(Math.PI*2/5)-Math.PI/2;
      ctx.save();ctx.rotate(a2);
      ctx.beginPath();
      for(let j=0;j<5;j++){
        const a3=j*(Math.PI*2/5)-Math.PI/2;
        const r2=ball.size*0.48;
        j===0?ctx.moveTo(Math.cos(a3)*r2,Math.sin(a3)*r2):ctx.lineTo(Math.cos(a3)*r2,Math.sin(a3)*r2);
      }
      ctx.closePath();ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
    ctx.globalAlpha=1;

    // --- VIGNETTE ---
    const vig=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,W*0.8);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(0,0,5,0.7)');
    ctx.fillStyle=vig;
    ctx.fillRect(0,0,W,H);

    // --- GIVRE (frost) en haut ---
    const frost=ctx.createLinearGradient(0,0,0,H*0.25);
    frost.addColorStop(0,'rgba(150,200,255,0.06)');
    frost.addColorStop(1,'rgba(150,200,255,0)');
    ctx.fillStyle=frost;
    ctx.fillRect(0,0,W,H*0.25);

    requestAnimationFrame(draw);
  }
  draw();
})();

// SCROLL REVEAL
// ═══════════════════════════════════════════════════
const revealObs=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');revealObs.unobserve(e.target);}});
},{threshold:0.08});
function attachReveal(container){
  container.querySelectorAll('.mc,.rc,.rank-tbl tr').forEach((el,i)=>{
    el.classList.add('scroll-reveal');
    el.style.transitionDelay=`${Math.min(i*0.04,0.4)}s`;
    revealObs.observe(el);
  });
}

function startCountdown(){
  const target=new Date('2026-06-11T22:00:00Z').getTime();
  const banner=document.getElementById('countdown-banner');
  function update(){
    const diff=target-Date.now();
    if(diff<=0){banner.classList.remove('show');return;}
    banner.classList.add('show');
    const d=Math.floor(diff/864e5);
    const h=Math.floor((diff%864e5)/36e5);
    const m=Math.floor((diff%36e5)/6e4);
    const s=Math.floor((diff%6e4)/1e3);
    banner.innerHTML=`⏱ Coup d'envoi dans <strong>${d}j ${h}h ${m}m ${s}s</strong> — Mexique 🇲🇽 vs Afrique du Sud 🇿🇦`;
    setTimeout(update,1000);
  }
  update();
}

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
let CU=null;
function amsg(id,t,type='err'){const e=document.getElementById(id);e.textContent=t;e.className='auth-msg '+type;}
function switchTab(t){
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('login-form').style.display=t==='login'?'':'none';
  document.getElementById('register-form').style.display=t==='register'?'':'none';
}
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function register(){
  const pseudo=document.getElementById('r-pseudo').value.trim();
  const pwd=document.getElementById('r-pwd').value;
  const pwd2=document.getElementById('r-pwd2').value;
  if(pseudo.length<2) return amsg('r-msg','Pseudo trop court (min 2 caractères).');
  if(pseudo.length>20) return amsg('r-msg','Pseudo trop long.');
  if(pwd.length<4) return amsg('r-msg','Mot de passe trop court (min 4 caractères).');
  if(pwd!==pwd2) return amsg('r-msg','Les mots de passe ne correspondent pas.');
  const btn=document.getElementById('btn-register');
  btn.disabled=true;amsg('r-msg','Création du compte…','ok');
  try{
    const existing=await sbGet('cm26_users',`pseudo=eq.${encodeURIComponent(pseudo.toLowerCase())}`);
    if(existing&&existing.length>0){btn.disabled=false;return amsg('r-msg','Ce pseudo est déjà pris.');}
    const hash=await sha256(pwd);
    const allUsers=await sbGet('cm26_users','');
    const isAdmin=!allUsers||allUsers.length===0;
    await sbUpsert('cm26_users',{pseudo:pseudo.toLowerCase(),hash,is_admin:isAdmin,created_at:Date.now()});
    await sbUpsert('cm26_scores',{pseudo:pseudo.toLowerCase(),total:0,p3:0,p2:0,p1:0});
    amsg('r-msg',isAdmin?'Compte créé ! Tu es administrateur.':'Compte créé !','ok');
    setTimeout(()=>doLogin({pseudo:pseudo.toLowerCase(),displayPseudo:pseudo,isAdmin}),800);
  }catch(e){btn.disabled=false;amsg('r-msg','Erreur : '+e.message);}
}
async function login(){
  const pseudo=document.getElementById('l-pseudo').value.trim().toLowerCase();
  const pwd=document.getElementById('l-pwd').value;
  if(!pseudo||!pwd) return amsg('l-msg','Remplis tous les champs.');
  const btn=document.getElementById('btn-login');
  btn.disabled=true;amsg('l-msg','Connexion…','ok');
  try{
    const rows=await sbGet('cm26_users',`pseudo=eq.${encodeURIComponent(pseudo)}`);
    if(!rows||rows.length===0){btn.disabled=false;return amsg('l-msg','Pseudo introuvable.');}
    const ud=rows[0];
    const hash=await sha256(pwd);
    if(hash!==ud.hash){btn.disabled=false;return amsg('l-msg','Mot de passe incorrect.');}
    doLogin({pseudo:ud.pseudo,displayPseudo:ud.pseudo,isAdmin:ud.is_admin});
  }catch(e){btn.disabled=false;amsg('l-msg','Erreur de connexion.');}
}
function doLogin(user){
  CU=user;
  localStorage.setItem('cm26_sess',JSON.stringify(user));
  const as=document.getElementById('auth-screen');as.classList.remove('show');as.style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('h-pseudo').textContent=user.displayPseudo||user.pseudo;
  document.getElementById('h-admin').style.display=user.isAdmin?'':'none';
  document.getElementById('admin-nav-btn').style.display=user.isAdmin?'':'none';
  document.getElementById('l-pseudo').value='';
  document.getElementById('l-pwd').value='';
  document.getElementById('l-msg').textContent='';
  document.getElementById('btn-login').disabled=false;
  startCountdown();
  showPage('pronostics');
}
function logout(){
  CU=null;localStorage.removeItem('cm26_sess');
  switchTab('login');
  document.getElementById('app').style.display='none';

let myPronos={},globalResults={};

function fmtKickoff(utc){
  if(!utc) return '';
  return new Date(utc).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Paris'})+' 🇫🇷';
}

async function renderProno(){
  document.getElementById('prono-content').innerHTML='<div class="loading-page"><span class="spinner"></span> Chargement…</div>';
  const rows=await sbGet('cm26_pronos',`pseudo=eq.${encodeURIComponent(CU.pseudo)}`);
  myPronos={};
  if(rows) rows.forEach(r=>{myPronos[r.match_id]={home:r.home_score,away:r.away_score};});
  const rrows=await sbGet('cm26_results','');
  globalResults={};
  if(rrows) rrows.forEach(r=>{globalResults[r.match_id]={home:r.home_score,away:r.away_score};});

  const byDate={};
  for(const m of MATCHES){
    if(!byDate[m.dateISO]) byDate[m.dateISO]={label:m.dateLabel,phase:m.phase,matches:[]};
    byDate[m.dateISO].matches.push(m);
  }
  const dates=Object.keys(byDate).sort();
  let html='',lastPhase=null;
  for(const d of dates){
    const {label,phase,matches}=byDate[d];
    if(phase!==lastPhase){
      html+=`<div class="phase-sep"><span class="phase-sep-label">${PL[phase]}</span><span class="phase-sep-line"></span></div>`;
      lastPhase=phase;
    }
    html+=`<div class="date-hd"><span class="date-badge">${label}</span></div>`;
    for(const m of matches){
      const p=myPronos[m.id];
      const now=Date.now();
      const kickoff=m.kickoffUTC?new Date(m.kickoffUTC).getTime():Infinity;
      const started=now>=kickoff;
      const locked=started||!!globalResults[m.id];
      const saved=p&&p.home!==undefined&&p.home!==null;
      const fh=FLAGS[m.home]||'🏳️',fa=FLAGS[m.away]||'🏳️';
      const hc=TEAM_GROUP[m.home]?`onclick="openTeamModal('${m.home.replace(/'/g,"\\'")}')"` :'';
      const ac=TEAM_GROUP[m.away]?`onclick="openTeamModal('${m.away.replace(/'/g,"\\'")}')"` :'';
      const koLabel=fmtKickoff(m.kickoffUTC);
      const cardClass=`mc${saved?' saved':''}${locked?' locked':''}${started&&!globalResults[m.id]?' started':''}`;
      html+=`<div class="${cardClass}" id="mc-${m.id}">
        <div class="team"><span class="flag">${fh}</span><span class="tn" ${hc}>${m.home}</span></div>
        <div class="mc-mid">
          <div class="mc-time">${koLabel||PL[m.phase]}</div>
          ${locked
            ?`<div class="lock-score">${saved?p.home+' – '+p.away:'—'}</div><div class="lock-icon">${started?'🔒 Commencé':'🔒 Saisi'}</div>`
            :`<div class="si-wrap">
                <input type="number" class="si" min="0" max="99" id="ph-${m.id}" value="${saved?p.home:''}" placeholder="–" oninput="autoSave('${m.id}')">
                <span class="sep">:</span>
                <input type="number" class="si" min="0" max="99" id="pa-${m.id}" value="${saved?p.away:''}" placeholder="–" oninput="autoSave('${m.id}')">
              </div>`}
        </div>
        <div class="team r"><span class="tn" ${ac}>${m.away}</span><span class="flag">${fa}</span></div>
      </div>`;
    }
  }
  const container=document.getElementById('prono-content');
  container.innerHTML=html;
  attachReveal(container);
}

const _timers={};
function autoSave(mid){clearTimeout(_timers[mid]);_timers[mid]=setTimeout(()=>saveProno(mid),700);}
async function saveProno(mid){
  const hEl=document.getElementById('ph-'+mid),aEl=document.getElementById('pa-'+mid);
  if(!hEl||!aEl) return;
  const match=MATCHES.find(m=>m.id===mid);
  if(match&&match.kickoffUTC&&Date.now()>=new Date(match.kickoffUTC).getTime()){
    toast('⛔ Trop tard, le match a commencé !','err');return;
  }
  const h=hEl.value,a=aEl.value;
  if(h===''||a==='') return;
  const hs=parseInt(h),as=parseInt(a);
  myPronos[mid]={home:hs,away:as};
  await sbUpsert('cm26_pronos',{pseudo:CU.pseudo,match_id:mid,home_score:hs,away_score:as});
  document.getElementById('mc-'+mid)?.classList.add('saved');
  toast('✓ Prono sauvegardé','ok');
  recalcScore();
}
async function recalcScore(){
  let total=0,p3=0,p2=0,p1=0;
  for(const m of MATCHES){
    const r=globalResults[m.id],p=myPronos[m.id];
    if(!r||!p||p.home===null) continue;
    const pts=calcPts(r,p);total+=pts;
    if(pts===3)p3++;else if(pts===2)p2++;else if(pts===1)p1++;
  }
  await sbUpsert('cm26_scores',{pseudo:CU.pseudo,total,p3,p2,p1});
}

  const allPronos={};
  if(userList.length>0){
    const prows=await sbGet('cm26_pronos','');
    if(prows) prows.forEach(r=>{
      if(!allPronos[r.pseudo]) allPronos[r.pseudo]={};
      allPronos[r.pseudo][r.match_id]={home:r.home_score,away:r.away_score};

  for(const m of MATCHES){
    if(!byDate[m.dateISO]) byDate[m.dateISO]={label:m.dateLabel,phase:m.phase,matches:[]};

      const r=globalResults[m.id];

          ${r?`<button class="btn-del" onclick="deleteResult('${m.id}')">✕</button>`:''}

async function saveResult(mid){
  if(!CU.isAdmin) return;
  const h=document.getElementById('rh-'+mid)?.value;
  const a=document.getElementById('ra-'+mid)?.value;
  if(h===''||a===''){toast('Saisis les deux scores !','err');return;}
  if(!confirm(`Valider ${h} – ${a} ? Les pronos seront révélés.`)) return;
  await sbUpsert('cm26_results',{match_id:mid,home_score:parseInt(h),away_score:parseInt(a)});
  globalResults[mid]={home:parseInt(h),away:parseInt(a)};
  await recalcAllScores();
  toast('✓ Résultat enregistré','ok');
  renderResults();
}
async function deleteResult(mid){
  if(!CU.isAdmin) return;
  if(!confirm('Supprimer ce résultat ?')) return;
  await sbDelete('cm26_results',`match_id=eq.${encodeURIComponent(mid)}`);
  delete globalResults[mid];
  await recalcAllScores();
  toast('Résultat supprimé','ok');
  renderResults();
}
async function recalcAllScores(){
  const rrows=await sbGet('cm26_results','');
  const res={};
  if(rrows) rrows.forEach(r=>{res[r.match_id]={home:r.home_score,away:r.away_score};});
  const prows=await sbGet('cm26_pronos','');
  const byUser={};
  if(prows) prows.forEach(r=>{
    if(!byUser[r.pseudo]) byUser[r.pseudo]={};
    byUser[r.pseudo][r.match_id]={home:r.home_score,away:r.away_score};
  });
  const users=await sbGet('cm26_users','');
  if(!users) return;
  for(const u of users){
    const pronos=byUser[u.pseudo]||{};
    let total=0,p3=0,p2=0,p1=0;
    for(const m of MATCHES){
      const r=res[m.id],p=pronos[m.id];
      if(!r||!p||p.home===null) continue;
      const pts=calcPts(r,p);total+=pts;
      if(pts===3)p3++;else if(pts===2)p2++;else if(pts===1)p1++;
    }
    await sbUpsert('cm26_scores',{pseudo:u.pseudo,total,p3,p2,p1});
  }
}

// POINTS
// ═══════════════════════════════════════════════════
function calcPts(result,prono){
  if(!prono||prono.home===undefined||prono.home===null) return 0;
  const{home:rh,away:ra}=result,{home:ph,away:pa}=prono;
  if(rh===ph&&ra===pa) return 3;
  const rd=rh-ra,pd=ph-pa;
  if(rd===pd) return 2;
  if(Math.sign(rd)===Math.sign(pd)) return 1;
  return 0;
}

// MODAL ÉQUIPE — stats enrichies

async function openTeamModal(teamName){
  document.getElementById('team-modal').classList.add('open');
  document.getElementById('modal-inner').innerHTML='<div style="text-align:center;padding:2.5rem"><span class="spinner"></span></div>';
  const group=TEAM_GROUP[teamName];
  const flag=FLAGS[teamName]||'🏳️';
  const rrows=await sbGet('cm26_results','');
  const res={};
  if(rrows) rrows.forEach(r=>{res[r.match_id]={home:r.home_score,away:r.away_score};});

  const teamMatches=MATCHES.filter(m=>m.phase==='group'&&(m.home===teamName||m.away===teamName));
  const played=teamMatches.filter(m=>res[m.id]);

  // Forme + stats
  let wins=0,draws=0,losses=0,gf=0,ga=0;
  let formDots='<div class="form-dots">';
  let formHtml='';
  if(!played.length){
    formHtml='<p style="color:var(--muted);font-size:.82rem;font-style:italic">Aucun match joué pour l\'instant.</p>';
    formDots='';
  }else{
    formHtml='<table class="form-tbl"><thead><tr><th>Adversaire</th><th>Score</th><th>Résultat</th></tr></thead><tbody>';
    for(const m of played){
      const r=res[m.id];
      const isHome=m.home===teamName;
      const opp=isHome?m.away:m.home;
      const mgf=isHome?r.home:r.away,mga=isHome?r.away:r.home;
      gf+=mgf;ga+=mga;
      const wdl=mgf>mga?'W':mgf<mga?'L':'D';
      if(wdl==='W')wins++;else if(wdl==='D')draws++;else losses++;
      formDots+=`<div class="form-dot ${wdl}" title="${wdl==='W'?'Victoire':wdl==='D'?'Nul':'Défaite'}"></div>`;
      formHtml+=`<tr>
        <td>${FLAGS[opp]||'🏳️'} ${opp}</td>
        <td style="font-family:'Bebas Neue';font-size:1.05rem;letter-spacing:.05em">${mgf} – ${mga}</td>
        <td><span class="form-badge fb-${wdl}">${wdl==='W'?'V':wdl==='D'?'N':'D'}</span></td>
      </tr>`;
    }
    formHtml+='</tbody></table>';
    formDots+='</div>';
  }

  // Stats cards
  const statsHtml=played.length?`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${wins}</div><div class="stat-lbl">Victoires</div></div>
      <div class="stat-card"><div class="stat-val">${draws}</div><div class="stat-lbl">Nuls</div></div>
      <div class="stat-card"><div class="stat-val">${gf}</div><div class="stat-lbl">Buts marqués</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${ga}</div><div class="stat-lbl">Buts encaissés</div></div>
    </div>`:'';

  // Classement groupe
  const gMatches=MATCHES.filter(m=>m.phase==='group'&&m.group===group);
  const gTeams=[...new Set(gMatches.flatMap(m=>[m.home,m.away]))];
  const st={};
  for(const t of gTeams) st[t]={name:t,pts:0,gd:0,gf:0,pld:0,w:0,d:0,l:0};
  for(const m of gMatches){
    const r=res[m.id];if(!r) continue;
    st[m.home].pld++;st[m.away].pld++;
    st[m.home].gf+=r.home;st[m.home].gd+=(r.home-r.away);
    st[m.away].gf+=r.away;st[m.away].gd+=(r.away-r.home);
    if(r.home>r.away){st[m.home].pts+=3;st[m.home].w++; st[m.away].l++;}
    else if(r.home===r.away){st[m.home].pts++;st[m.away].pts++;st[m.home].d++;st[m.away].d++;}
    else{st[m.away].pts+=3;st[m.away].w++;st[m.home].l++;}
  }
  const ranked=Object.values(st).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  let gHtml=`<table class="group-tbl"><thead><tr>
    <th>#</th><th>Équipe</th><th>J</th><th>V</th><th>N</th><th>D</th><th>DB</th><th>Pts</th>
  </tr></thead><tbody>`;
  ranked.forEach((t,i)=>{
    gHtml+=`<tr class="${t.name===teamName?'hl':''}">
      <td>${i+1}</td>
      <td>${FLAGS[t.name]||'🏳️'} ${t.name}</td>
      <td>${t.pld}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td style="color:${t.gd>=0?'var(--green)':'var(--red)'}">${t.gd>=0?'+':''}${t.gd}</td>
      <td style="font-weight:800;color:var(--gold-l)">${t.pts}</td>
    </tr>`;
  });
  gHtml+='</tbody></table>';

  // Vedettes de l'équipe
  const stars=TEAM_STARS[teamName]||[];
  const starsHtml=stars.length?`
    <div class="modal-section">
      <div class="modal-section-title">Joueurs à suivre</div>
      <div style="display:flex;flex-wrap:wrap;gap:.4rem">
        ${stars.map(s=>`<span style="background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:.3rem .65rem;font-size:.8rem;font-weight:600">${s}</span>`).join('')}
      </div>
    </div>`:'';

  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-team-header">
      <div class="modal-flag">${flag}</div>
      <div>
        <div class="modal-team-name">${teamName}</div>
        <div class="modal-group-badge">Groupe ${group}</div>
        ${formDots}
      </div>
    </div>
    ${statsHtml}
    ${starsHtml}
    <div class="modal-section">
      <div class="modal-section-title">Derniers matchs</div>
      ${formHtml}
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Classement Groupe ${group}</div>
      ${gHtml}
    </div>`;
}

let mySurveyAnswers = {};   // {surveyId: answer or {p1,p2,p3}}
let surveyResults = {};     // {surveyId: answer} — admin only
let allSurveyAnswers = {};  // {pseudo: {surveyId: answer}} — tous

function buildSurveyCard(s, locked){
  const myAns = mySurveyAnswers[s.id];
  const result = surveyResults[s.id];
  const isPodium = s.type==='podium';
  const saved = myAns !== undefined;
  const ptsLabel = isPodium ? '5/4/3 pts' : s.pts+' pts';
  const medals = ['\ud83e\udd47','\ud83e\udd48','\ud83e\udd49'];

  // ── INPUT ──
  let inputHtml = '';
  if(isPodium){
    inputHtml = '<div class="podium-picker">';
    for(let i=0;i<s.slots.length;i++){
      const key = 'p'+(i+1);
      const chosen = myAns ? (myAns[key]||'\u2014') : '\u2014';
      const correct = result ? result[key] : null;
      const isCorrect = correct && chosen===correct;
      inputHtml += '<div class="podium-slot">';
      inputHtml += '<div class="podium-slot-label s'+(i+1)+'">'+medals[i]+'</div>';
      if(locked || result){
        const st = isCorrect ? 'color:var(--green);border-color:rgba(34,197,94,.4)' : '';
        inputHtml += '<div style="flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:.5rem .85rem;font-size:.88rem;font-weight:600;'+st+'">';
        inputHtml += chosen+(isCorrect ? ' \u2713 +'+s.pts[i]+'pts' : '')+'</div>';
      } else {
        inputHtml += '<select id="sv_'+s.id+'_'+key+'" data-sid="'+s.id+'" class="prono-podium-select"'+(locked?' disabled':'')+' onchange="saveSurveyPodium(this.dataset.sid)">';
        inputHtml += '<option value="">'+s.slots[i]+'...</option>';
        for(const o of s.options){
          inputHtml += '<option value="'+o+'"'+(o===chosen&&chosen!=='\u2014'?' selected':'')+'>'+o+'</option>';
        }
        inputHtml += '</select>';
      }
      inputHtml += '</div>';
    }
    inputHtml += '</div>';
  } else {
    const val = myAns||'';
    if(locked || result){
      const isCorrect = result && val===result;
      const st = isCorrect ? 'color:var(--green);border-color:rgba(34,197,94,.4)' : 'border:1px solid var(--border)';
      inputHtml = '<div style="background:var(--s2);'+st+';border-radius:var(--r2);padding:.55rem .85rem;font-size:.88rem;font-weight:600">';
      inputHtml += (val||'\u2014')+(isCorrect?' \u2713 +'+s.pts+' pts':'')+'</div>';
    } else {
      inputHtml = '<div class="survey-select-wrap"><select class="survey-select" id="sv_'+s.id+'" data-sid="'+s.id+'" onchange="saveSurvey(this.dataset.sid)"'+(locked?' disabled':'')+' >';
      inputHtml += '<option value="">\u2014 Choisir une r\xe9ponse \u2014</option>';
      for(const o of s.options){
        inputHtml += '<option value="'+o+'"'+(o===val?' selected':'')+'>'+o+'</option>';
      }
      inputHtml += '</select></div>';
    }
  }

  // ── RÉSULTATS RÉVÉLÉS ──
  let revealedHtml = '';
  if(result){
    const ad = isPodium ? Object.values(result).join(' \u2192 ') : result;
    revealedHtml = '<div class="survey-answer-revealed"><span class="answer-icon">\u2705</span><span>R\xe9ponse : <strong>'+ad+'</strong></span></div>';
    const pseudos = Object.keys(allSurveyAnswers);
    if(pseudos.length){
      revealedHtml += '<div class="responses-grid" style="margin-top:.75rem">';
      for(const u of pseudos){
        const uAns = allSurveyAnswers[u] && allSurveyAnswers[u][s.id];
        if(!uAns) continue;
        const pts = calcSurveyPts(s, uAns, result);
        const ansStr = isPodium ? Object.values(uAns).join(' / ') : uAns;
        revealedHtml += '<div class="response-chip '+(pts>0?'correct':'wrong')+'">';
        revealedHtml += '<div class="rc-name">'+u+'</div>';
        revealedHtml += '<div class="rc-answer">'+ansStr+(pts>0?' <span class="rc-pts" style="color:var(--green)">+'+pts+'</span>':'')+'</div>';
        revealedHtml += '</div>';
      }
      revealedHtml += '</div>';
    }
  }

  // ── ADMIN ──
  let adminHtml = '';
  if(CU && CU.isAdmin && !result){
    adminHtml = '<div class="survey-result-row"><label>'+(isPodium?'Podium officiel :':'Bonne r\xe9ponse :')+'</label>';
    if(isPodium){
      for(let i=0;i<s.slots.length;i++){
        adminHtml += '<select id="ar_'+s.id+'_p'+(i+1)+'" class="survey-select" style="max-width:150px">';
        adminHtml += '<option value="">'+medals[i]+'...</option>';
        for(const o of s.options) adminHtml += '<option>'+o+'</option>';
        adminHtml += '</select>';
      }
      adminHtml += '<button class="btn-validate" data-sid="'+s.id+'" onclick="validateSurveyPodium(this.dataset.sid)">\u2713</button>';
    } else {
      adminHtml += '<select id="ar_'+s.id+'" class="survey-select" style="max-width:200px">';
      adminHtml += '<option value="">Choisir...</option>';
      for(const o of s.options) adminHtml += '<option>'+o+'</option>';
      adminHtml += '</select>';
      adminHtml += '<button class="btn-validate" data-sid="'+s.id+'" onclick="validateSurvey(this.dataset.sid)">\u2713</button>';
    }
    adminHtml += '</div>';
  }

  const savedBadge = (saved&&!locked&&!result) ? '<div class="survey-saved-badge">\u2713 R\xe9ponse enregistr\xe9e</div>' : '';
  const lockedMsg = (locked&&!saved) ? '<div class="survey-locked-msg">\ud83d\udd12 Tu n\'as pas r\xe9pondu avant la fermeture</div>' : '';
  const cardClass = 'survey-card'+(isPodium?' podium-card-sv':'')+(locked?' locked-survey':'');

  let out = '<div class="'+cardClass+'" id="sc_'+s.id+'">';
  out += '<div class="survey-header"><div>';
  out += '<div class="survey-title">'+s.title+'</div>';
  if(s.desc) out += '<div style="font-size:.76rem;color:var(--muted);margin-top:.25rem">'+s.desc+'</div>';
  out += '</div><div class="survey-pts">'+ptsLabel+'</div></div>';
  out += inputHtml+savedBadge+lockedMsg+revealedHtml+adminHtml;
  out += '</div>';
  return out;
}


function calcSurveyPts(survey, userAnswer, correctAnswer){
  if(!correctAnswer||!userAnswer) return 0;
  if(survey.type==='podium'){
    let pts=0;
    const s=survey;
    if(userAnswer.p1===correctAnswer.p1) pts+=s.pts[0];
    if(userAnswer.p2===correctAnswer.p2) pts+=s.pts[1];
    if(userAnswer.p3===correctAnswer.p3) pts+=s.pts[2];
    return pts;
  }
  return userAnswer===correctAnswer ? survey.pts : 0;
}

async function saveSurvey(surveyId){
  if(Date.now() >= SURVEY_DEADLINE){ toast('⛔ Sondages fermés !','err'); return; }
  const el=document.getElementById('sv_'+surveyId);
  if(!el||!el.value) return;
  const val=el.value;
  mySurveyAnswers[surveyId]=val;
  await sbUpsert('cm26_survey_answers',{pseudo:CU.pseudo, survey_id:surveyId, answer:JSON.stringify(val)});
  toast('✓ Réponse enregistrée','ok');
  // Badge
  const card=document.getElementById('sc_'+surveyId);
  if(card){
    let badge=card.querySelector('.survey-saved-badge');
    if(!badge){
      badge=document.createElement('div');
      badge.className='survey-saved-badge';
      badge.textContent='✓ Réponse enregistrée';
      el.closest('.survey-card').appendChild(badge);
    }
  }
  await recalcSurveyScores();
}

async function saveSurveyPodium(surveyId){
  if(Date.now() >= SURVEY_DEADLINE){ toast('⛔ Sondages fermés !','err'); return; }
  const p1=document.getElementById(`sv_${surveyId}_p1`)?.value||'';
  const p2=document.getElementById(`sv_${surveyId}_p2`)?.value||'';
  const p3=document.getElementById(`sv_${surveyId}_p3`)?.value||'';
  if(!p1&&!p2&&!p3) return;
  const val={p1,p2,p3};
  mySurveyAnswers[surveyId]=val;
  await sbUpsert('cm26_survey_answers',{pseudo:CU.pseudo,survey_id:surveyId,answer:JSON.stringify(val)});
  toast('✓ Podium sauvegardé','ok');
  await recalcSurveyScores();
}

async function validateSurvey(surveyId){
  const el=document.getElementById('ar_'+surveyId);
  if(!el||!el.value){toast('Choisis une réponse !','err');return;}
  if(!confirm(`Valider "${el.value}" comme bonne réponse ?`)) return;
  surveyResults[surveyId]=el.value;
  await sbUpsert('cm26_survey_results',{survey_id:surveyId,answer:JSON.stringify(el.value)});
  await recalcSurveyScores();
  toast('✓ Résultat sondage enregistré','ok');
  renderSurveys();
}

async function validateSurveyPodium(surveyId){
  const p1=document.getElementById(`ar_${surveyId}_p1`)?.value||'';
  const p2=document.getElementById(`ar_${surveyId}_p2`)?.value||'';
  const p3=document.getElementById(`ar_${surveyId}_p3`)?.value||'';
  if(!p1||!p2||!p3){toast('Remplis les 3 positions !','err');return;}
  if(!confirm(`Valider ce podium : 🥇${p1} / 🥈${p2} / 🥉${p3} ?`)) return;
  const val={p1,p2,p3};
  surveyResults[surveyId]=val;
  await sbUpsert('cm26_survey_results',{survey_id:surveyId,answer:JSON.stringify(val)});
  await recalcSurveyScores();
  toast('✓ Podium validé','ok');
  renderSurveys();
}

async function recalcSurveyScores(){
  // Recalculer les points sondages pour tous et les ajouter au score principal
  const allRows=await sbGet('cm26_survey_answers','');
  const resRows=await sbGet('cm26_survey_results','');
  const results={};
  if(resRows) resRows.forEach(r=>{results[r.survey_id]=JSON.parse(r.answer);});
  // Grouper par pseudo
  const byUser={};
  if(allRows) allRows.forEach(r=>{
    if(!byUser[r.pseudo]) byUser[r.pseudo]={};
    byUser[r.pseudo][r.survey_id]=JSON.parse(r.answer);
  });
  // Mettre à jour les scores survey
  const users=await sbGet('cm26_users','');
  if(!users) return;
  for(const u of users){
    const ans=byUser[u.pseudo]||{};
    let surveyPts=0;
    for(const s of SURVEYS){
      const uAns=ans[s.id];
      const correct=results[s.id];
      if(!uAns||!correct) continue;
      surveyPts+=calcSurveyPts(s,uAns,correct);
    }
    // Récupérer les points matchs existants
    const scoreRows=await sbGet('cm26_scores',`pseudo=eq.${encodeURIComponent(u.pseudo)}`);
    const existing=scoreRows&&scoreRows[0]?scoreRows[0]:{total:0,p3:0,p2:0,p1:0,survey_pts:0};
    await sbUpsert('cm26_scores',{pseudo:u.pseudo,survey_pts:surveyPts});
  }
}

    <div style="margin-top:.75rem;padding:.75rem;background:rgba(255,200,60,.06);border:1px solid rgba(255,200,60,.15);border-radius:var(--r2);font-size:.78rem;color:var(--muted);">
      🏆 <strong style="color:var(--gold-l)">Sondages :</strong> Podium 5/4/3 pts · Autres sondages 3 pts chacun
    </div>
  </div>

  <!-- GESTION JOUEURS -->
  <div class="admin-section">
    <h3>👥 Participants (${users.length})</h3>
    ${users.map(u => {
      const sc = scMap[u.pseudo] || {total:0,p3:0,p2:0,p1:0};
      const me = u.pseudo === CU.pseudo;
      return `<div class="user-row">
        <div class="user-pseudo">${u.pseudo}${me?' (moi)':''}</div>
        <span class="user-badge ${u.is_admin?'admin':'player'}">${u.is_admin?'Admin':'Joueur'}</span>
        <span class="user-pts">${sc.total}pts</span>
        ${!me && !u.is_admin ? `<button class="btn-promote" onclick="promoteUser('${u.pseudo}')" title="Rendre admin">👑</button>` : ''}
        ${!me ? `<button class="btn-danger" onclick="deleteUser('${u.pseudo}')" title="Supprimer">🗑</button>` : ''}
      </div>`;
    }).join('')}
  </div>

  <!-- GESTION POINTS — AJUSTEMENT MANUEL -->
  <div class="admin-section">
    <h3>⚡ Ajustement de points</h3>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:.85rem;">Ajouter ou retirer des points manuellement à un joueur (bonus, pénalité, rattrapage…)</p>
    <div style="display:flex;flex-direction:column;gap:.6rem;">
      <div style="display:flex;gap:.5rem;align-items:center;">
        <select id="adj-pseudo" class="survey-select" style="flex:1">
          <option value="">Choisir un joueur…</option>
          ${users.map(u=>`<option value="${u.pseudo}">${u.pseudo}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;">
        <input type="number" id="adj-pts" class="inp" style="margin:0;width:90px" placeholder="pts" min="-99" max="99">
        <input type="text" id="adj-reason" class="inp" style="margin:0;flex:1" placeholder="Raison (optionnel)">
        <button class="btn-validate" onclick="adjustPoints()">Appliquer</button>
      </div>
    </div>
  </div>

  <!-- RÉINITIALISATION -->
  <div class="admin-section">
    <h3>🔄 Gestion avancée</h3>
    <div style="display:flex;flex-direction:column;gap:.6rem;">
      <button class="btn-save" style="width:100%;padding:.65rem" onclick="recalcAllFromAdmin()">
        🔁 Recalculer tous les scores
      </button>
      <button class="btn-danger" style="width:100%;padding:.65rem;border-radius:var(--r2)" onclick="resetAllResults()">
        🗑 Effacer tous les résultats
      </button>
      <button class="btn-danger" style="width:100%;padding:.65rem;border-radius:var(--r2)" onclick="resetAllSurveyResults()">
        🗑 Effacer les résultats sondages
      </button>
    </div>
    <p style="font-size:.72rem;color:var(--muted);margin-top:.75rem;text-align:center;">⚠️ Les suppressions sont irréversibles</p>
  </div>

  <!-- LOG ACTIVITÉ (derniers résultats saisis) -->
  <div class="admin-section admin-full">
    <h3>📊 Résultats saisis (${results.length}/104)</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.4rem;max-height:220px;overflow-y:auto;">
      ${results.length === 0
        ? '<p style="color:var(--muted);font-size:.82rem">Aucun résultat saisi pour le moment.</p>'
        : results.map(r => {
            const m = MATCHES.find(x=>x.id===r.match_id);
            if(!m) return '';
            return `<div style="background:rgba(8,20,55,.6);border:1px solid var(--ice-border);border-radius:8px;padding:.4rem .7rem;font-size:.78rem;display:flex;justify-content:space-between;align-items:center;">
              <span>${FLAGS[m.home]||'🏳️'} ${m.home}</span>
              <span style="font-family:'Bebas Neue';font-size:1rem;color:var(--gold-l)">${r.home_score}:${r.away_score}</span>
              <span>${FLAGS[m.away]||'🏳️'} ${m.away}</span>
            </div>`;
          }).join('')
      }
    </div>
  </div>

  </div>`;

  container.innerHTML = html;
}

// ── Actions admin ──
async function promoteUser(pseudo){
  if(!confirm(`Rendre "${pseudo}" administrateur ?`)) return;
  await sbUpsert('cm26_users',{pseudo, is_admin:true});
  toast(`✓ ${pseudo} est maintenant admin`,'ok');
  renderAdmin();
}

async function deleteUser(pseudo){
  if(!confirm(`Supprimer "${pseudo}" ? Ses pronostics seront aussi supprimés.`)) return;
  await sbDelete('cm26_users',`pseudo=eq.${encodeURIComponent(pseudo)}`);
  await sbDelete('cm26_pronos',`pseudo=eq.${encodeURIComponent(pseudo)}`);
  await sbDelete('cm26_scores',`pseudo=eq.${encodeURIComponent(pseudo)}`);
  await sbDelete('cm26_survey_answers',`pseudo=eq.${encodeURIComponent(pseudo)}`);
  toast(`Joueur ${pseudo} supprimé`,'ok');
  renderAdmin();
}

async function adjustPoints(){
  const pseudo = document.getElementById('adj-pseudo').value;
  const pts = parseInt(document.getElementById('adj-pts').value);
  if(!pseudo) return toast('Choisis un joueur !','err');
  if(isNaN(pts) || pts === 0) return toast('Saisis un nombre de points','err');
  const rows = await sbGet('cm26_scores',`pseudo=eq.${encodeURIComponent(pseudo)}`);
  const current = rows && rows[0] ? rows[0] : {total:0,p3:0,p2:0,p1:0};
  const newTotal = Math.max(0, (current.total||0) + pts);
  await sbUpsert('cm26_scores',{pseudo, total:newTotal, p3:current.p3||0, p2:current.p2||0, p1:current.p1||0});
  toast(`✓ ${pts>0?'+':''}${pts} pts pour ${pseudo} (nouveau total: ${newTotal})`,'ok');
  document.getElementById('adj-pts').value='';
  renderAdmin();
}

async function recalcAllFromAdmin(){
  toast('Recalcul en cours…','ok');
  await recalcAllScores();
  await recalcSurveyScores();
  toast('✓ Tous les scores recalculés !','ok');
  renderAdmin();
}

async function resetAllResults(){
  if(!confirm('⚠️ Supprimer TOUS les résultats de matchs ? Les scores seront remis à zéro.')) return;
  const rows = await sbGet('cm26_results','') || [];
  for(const r of rows) await sbDelete('cm26_results',`match_id=eq.${encodeURIComponent(r.match_id)}`);
  const users = await sbGet('cm26_users','') || [];
  for(const u of users) await sbUpsert('cm26_scores',{pseudo:u.pseudo,total:0,p3:0,p2:0,p1:0});
  globalResults={};
  toast('Tous les résultats supprimés','ok');
  renderAdmin();
}

async function resetAllSurveyResults(){
  if(!confirm('⚠️ Supprimer tous les résultats des sondages ?')) return;
  const rows = await sbGet('cm26_survey_results','') || [];
  for(const r of rows) await sbDelete('cm26_survey_results',`survey_id=eq.${encodeURIComponent(r.survey_id)}`);
  toast('Résultats sondages supprimés','ok');
  renderAdmin();
}

// TOAST
// ═══════════════════════════════════════════════════
let _tt;
function toast(m,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=m;el.className='show '+type;
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);
}

// INIT
// ═══════════════════════════════════════════════════
// Init immédiat — pas besoin d'attendre DOMContentLoaded car script est en bas du body
(function init(){
  switchTab('login');
  try{
    const sess=localStorage.getItem('cm26_sess');
    if(sess){
      const user=JSON.parse(sess);
      if(user&&user.pseudo){
        doLogin(user);
        return;
      }
    }
  }catch(e){
    localStorage.removeItem('cm26_sess');
  }
  // Pas de session valide : laisser l'auth-screen visible (déjà display:flex en HTML)
})();
</script>
